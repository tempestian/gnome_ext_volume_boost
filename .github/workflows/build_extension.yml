name: Build Volume Boost Extension

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt update
          sudo apt install -y jq

      - name: Get UUID from metadata.json
        id: get_uuid
        run: |
          UUID=$(jq -r .uuid metadata.json)
          echo "uuid=$UUID" >> $GITHUB_OUTPUT

      - name: Upload extension files (no zip)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_uuid.outputs.uuid }}
          path: |
            extension.js
            metadata.json
