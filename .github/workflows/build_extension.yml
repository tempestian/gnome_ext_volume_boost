name: Build Volume Boost Extension

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y make zip

      - name: Build extension
        run: make

      - name: Find built ZIP file
        id: find_zip
        run: |
          ZIP_FILE=$(find . -type f -name "*.zip" -print -quit)
          ZIP_NAME=$(basename "$ZIP_FILE")
          echo "zip_file=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "Found ZIP: $ZIP_NAME at $ZIP_FILE"

      - name: Upload original ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_zip.outputs.zip_name }}
          path: ${{ steps.find_zip.outputs.zip_file }}
